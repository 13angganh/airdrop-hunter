name: Deploy AirdropHunter to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true   # cancel older deploy if new push comes in

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Inject BUILD_TIME into SW so cache busts automatically on every deploy
      - name: Inject build timestamp into service worker
        run: |
          BUILD_TIME=$(date -u +"%Y%m%d%H%M%S")
          sed -i "s/__BUILD_TIME__/${BUILD_TIME}/g" firebase-messaging-sw.js
          echo "Build time injected: ${BUILD_TIME}"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # upload entire repo root as the site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
